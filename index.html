<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    <title>Flowdux - Find Products in Local Stores</title>
    <meta name="description" content="Find products in local stores instantly. Search real-time inventory, compare prices, and navigate to retailers with items in stock." />
    <meta name="author" content="Flowdux" />
    <meta name="theme-color" content="#1E3A5F" />
    
    <!-- Mobile App Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Flowdux" />
    
    <!-- Prevent text size adjustment on orientation change -->
    <meta name="format-detection" content="telephone=no" />

    <meta property="og:title" content="Flowdux - Find Products in Local Stores" />
    <meta property="og:description" content="Find products in local stores instantly. Search real-time inventory, compare prices, and navigate to retailers with items in stock." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icon-512.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Flowdux" />
    <meta name="twitter:image" content="/icon-512.png" />
    
    <!-- SEO: Sitemap and Canonical URL -->
    <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml" />
    <link rel="canonical" href="https://app-spark-forge-69.lovable.app/" />
    
    <!-- Icons -->
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Preload critical LCP image -->
    <link rel="preload" as="image" href="/icon-192.png" fetchpriority="high" />
    
    <!-- Preconnect to critical origins for faster loading -->
    <link rel="preconnect" href="https://hmwunbhtulrgalqrcnbv.supabase.co" crossorigin />
    <link rel="preconnect" href="https://maps.googleapis.com" crossorigin />
    <link rel="dns-prefetch" href="https://maps.gstatic.com" />
    
    <!-- Fonts with preconnect and optimal loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Critical CSS inline for font fallback -->
    <style>
      /* Font fallback to prevent FOIT/FOUT and CLS */
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      }
      /* Skeleton placeholder for LCP */
      .lcp-placeholder {
        background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
      }
      @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
    </style>
    
    <!-- Load fonts asynchronously to prevent render blocking -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    </noscript>
    
    <!-- Defer non-critical scripts -->
    <script src="https://checkout.razorpay.com/v1/checkout.js" defer></script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
