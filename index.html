    <!-- Inline critical CSS to reduce FCP -->
    <style>
      /* Critical CSS for initial render - prevents FOIT/FOUT */
      *,*::before,*::after{box-sizing:border-box}
      html{-webkit-text-size-adjust:100%;line-height:1.5}
      body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#F8F9FE;color:#1A1A2E}
      #root{min-height:100vh;display:flex;flex-direction:column}
      /* Initial loading skeleton */
      .initial-loader{display:flex;flex-direction:column;min-height:100vh;padding:1rem}
      .skeleton{background:linear-gradient(90deg,#e8e8f3 25%,#d8d8e8 50%,#e8e8f3 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:0.75rem}
      .skeleton-header{height:120px;margin-bottom:1rem;background:linear-gradient(135deg,#00D4FF,#6C5CE7);border-radius:0}
      .skeleton-card{height:180px;margin-bottom:0.75rem}
      @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
      /* Hide skeleton after app loads */
      .loaded .initial-loader{display:none}
    </style>
    
    <!-- Load fonts deferred for better FCP -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" /></noscript>
  </head>

  <body>
    <!-- CRITICAL: Cache bypass script runs BEFORE anything else -->
    <script>
      (function() {
        // Force clear stale service workers immediately
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            registrations.forEach(function(registration) {
              registration.unregister();
              console.log('[CacheFix] Service worker unregistered');
            });
          });
        }
        
        // Clear all caches
        if ('caches' in window) {
          caches.keys().then(function(names) {
            names.forEach(function(name) {
              caches.delete(name);
              console.log('[CacheFix] Cache deleted:', name);
            });
          });
        }
        
        // Set flag that cache was cleared this session
        sessionStorage.setItem('flowdux_cache_cleared', Date.now().toString());
      })();
    </script>

    <div id="root">
      <!-- Initial skeleton shown until React hydrates - prevents white screen -->
      <div class="initial-loader" aria-label="Loading Flowdux">
        <div class="skeleton skeleton-header"></div>
        <div style="padding:1rem">
          <div class="skeleton skeleton-card"></div>
          <div class="skeleton skeleton-card"></div>
        </div>
        
        <!-- Fallback recovery buttons - shown after 8 seconds if React fails -->
        <div id="recovery-panel" style="display:none;text-align:center;padding:2rem">
          <p style="color:#666;margin-bottom:1rem">Taking too long? Try these options:</p>
          <button onclick="location.reload(true)" style="background:#6C5CE7;color:white;border:none;padding:12px 24px;border-radius:8px;margin:8px;cursor:pointer;font-size:16px">
            Reload Page
          </button>
          <button onclick="clearAndReload()" style="background:#00D4FF;color:white;border:none;padding:12px 24px;border-radius:8px;margin:8px;cursor:pointer;font-size:16px">
            Clear Cache & Reload
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.tsx"></script>
    
    <script>
      // Recovery timeout - show buttons if React doesn't load in 8 seconds
      var recoveryTimeout = setTimeout(function() {
        var panel = document.getElementById('recovery-panel');
        if (panel && !document.body.classList.contains('loaded')) {
          panel.style.display = 'block';
          console.log('[Recovery] Showing recovery panel - React did not load');
        }
      }, 8000);
      
      // Clear and reload function
      window.clearAndReload = function() {
        if ('caches' in window) {
          caches.keys().then(function(names) {
            return Promise.all(names.map(function(name) { return caches.delete(name); }));
          }).then(function() {
            localStorage.clear();
            sessionStorage.clear();
            window.location.href = window.location.pathname + '?cleared=' + Date.now();
          });
        } else {
          localStorage.clear();
          sessionStorage.clear();
          window.location.href = window.location.pathname + '?cleared=' + Date.now();
        }
      };
      
      // Detect when React actually renders content using MutationObserver
      var rootEl = document.getElementById('root');
      if (rootEl) {
        var observer = new MutationObserver(function(mutations) {
          // Check if React has rendered real content (not just the skeleton)
          var hasReactContent = rootEl.querySelector('[data-reactroot], [data-testid], nav, main, header, .min-h-screen');
          if (hasReactContent || (rootEl.children.length > 1) || (rootEl.children.length === 1 && !rootEl.querySelector('.initial-loader'))) {
            document.body.classList.add('loaded');
            clearTimeout(recoveryTimeout);
            observer.disconnect();
          }
        });
        observer.observe(rootEl, { childList: true, subtree: true });
      }
      
      // Also mark loaded when app signals ready
      window.markAppLoaded = function() {
        document.body.classList.add('loaded');
        clearTimeout(recoveryTimeout);
        var panel = document.getElementById('recovery-panel');
        if (panel) panel.style.display = 'none';
      };
    </script>
  </body>
</html>
